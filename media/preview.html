<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Claude Usage — Icon Preview</title>
<style>
  body { background: #1e1e2e; display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; font-family: system-ui, sans-serif; gap: 40px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 12px; color: #ccc; font-size: 12px; }
  .bg-dark  { background: #1e1e2e; padding: 24px; border-radius: 12px; }
  .bg-light { background: #f0f0f0; padding: 24px; border-radius: 12px; }
  .bg-marketplace { background: #2c2c32; padding: 24px; border-radius: 12px; }
  img { display: block; }
</style>
</head>
<body>
  <div class="swatch">
    <div class="bg-dark"><img src="icon.svg" width="128" height="128"></div>
    <span>128 × 128 — dark bg</span>
  </div>
  <div class="swatch">
    <div class="bg-dark"><img src="icon.svg" width="64" height="64"></div>
    <span>64 × 64</span>
  </div>
  <div class="swatch">
    <div class="bg-dark"><img src="icon.svg" width="32" height="32"></div>
    <span>32 × 32</span>
  </div>
  <div class="swatch">
    <div class="bg-marketplace"><img src="icon.svg" width="128" height="128"></div>
    <span>Marketplace panel</span>
  </div>
  <div class="swatch">
    <div class="bg-light"><img src="icon.svg" width="128" height="128"></div>
    <span>128 × 128 — light bg</span>
  </div>
</body>
</html>
