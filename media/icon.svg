<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#13131f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a070"/>
      <stop offset="100%" style="stop-color:#c85a30"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c6af7" stop-opacity="0.2"/>
      <stop offset="35%"  stop-color="#7c6af7"/>
      <stop offset="65%"  stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Bottom stack — clock -->
  <rect x="20" y="82" width="88" height="10" rx="3" fill="#1c1c2e" stroke="#2e2c48" stroke-width="1.2"/>
  <circle cx="64" cy="87" r="3.8" fill="none" stroke="#7c6af7" stroke-width="0.9" opacity="0.85"/>
  <line x1="64" y1="87" x2="62.5" y2="84.2" stroke="#7c6af7"  stroke-width="1"   stroke-linecap="round" opacity="0.85"/>
  <line x1="64" y1="87" x2="66.8" y2="84.0" stroke="#a78bfa" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>
  <circle cx="64" cy="87" r="0.7" fill="#7c6af7" opacity="0.9"/>

  <!-- Middle stack — dollar sign -->
  <rect x="20" y="70" width="88" height="10" rx="3" fill="#202030" stroke="#32304e" stroke-width="1.2"/>
  <text x="64" y="77.5" text-anchor="middle"
        font-family="system-ui,sans-serif"
        font-size="7" font-weight="700"
        fill="#4ade80" opacity="0.85">$</text>

  <!-- Top stack (hidden behind main card) -->
  <rect x="20" y="58" width="88" height="10" rx="3" fill="#242244" stroke="#363460" stroke-width="1.2"/>

  <!-- Top card full face -->
  <rect x="20" y="24" width="88" height="46" rx="6" fill="#2a2848" stroke="#d97757" stroke-width="2"/>

  <!-- Pulse / heartbeat line on top card -->
  <polyline
    points="26,47 35,47 40,39 46,55 52,43 58,49 64,41 70,49 76,43 82,55 88,39 93,47 102,47"
    fill="none" stroke="url(#pulseGrad)" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Claude asterisk on top card -->
  <g transform="translate(64,47)" fill="url(#glow)">
    <circle cx="0" cy="0" r="5.5"/>
    <ellipse cx="0" cy="0" rx="3.8" ry="14" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="3.8" ry="14" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="3.8" ry="14" transform="rotate(120)"/>
  </g>

  <!-- CLUSAGE label -->
  <text x="64" y="110" text-anchor="middle"
        font-family="system-ui,sans-serif"
        font-size="11" font-weight="600" letter-spacing="3"
        fill="#d97757" opacity="0.8">CLUSAGE</text>
</svg>
